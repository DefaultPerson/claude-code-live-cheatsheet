name: Update Cheatsheet

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force update even if no new version'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 1
    outputs:
      should_update: ${{ steps.version.outputs.should_update }}
      latest: ${{ steps.version.outputs.latest }}
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: cheatsheet.json
          sparse-checkout-cone-mode: false

      - name: Check npm for new version
        id: version
        run: |
          CURRENT=$(node -e "console.log(JSON.parse(require('fs').readFileSync('cheatsheet.json','utf8')).meta.lastVersion)")
          LATEST=$(curl -sf https://registry.npmjs.org/@anthropic-ai/claude-code/latest | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>console.log(JSON.parse(d).version))")
          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          echo "latest=$LATEST" >> $GITHUB_OUTPUT
          if [ "$CURRENT" = "$LATEST" ] && [ "${{ github.event.inputs.force }}" != "true" ]; then
            echo "should_update=false" >> $GITHUB_OUTPUT
            echo "✓ Up to date: v$CURRENT"
          else
            echo "should_update=true" >> $GITHUB_OUTPUT
            echo "⚡ New version: v$CURRENT → v$LATEST"
          fi

  update:
    needs: check
    if: needs.check.outputs.should_update == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Chromium
        run: npx puppeteer browsers install chrome

      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node src/main.js --force

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet && git diff --cached --quiet && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase || true
          git add cheatsheet.json cheatsheet.png README.md CHEATSHEET.md docs/
          VERSION=$(node -e "console.log(JSON.parse(require('fs').readFileSync('cheatsheet.json','utf8')).meta.lastVersion)")
          git commit -m "cheatsheet: update to v${VERSION}"
          git push
